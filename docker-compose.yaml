networks:
  infra-net:
    driver: bridge

volumes:
  kafka_data:
  mysql_data:

services:
  kafka:
    image: apache/kafka:4.2.0
    profiles: ["infra", "full"]
    networks: [infra-net]
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      # -------- KRaft "combined mode" (broker + controller in one node) --------
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

      # -------- Dual listeners (HOST + DOCKER) + controller listener --------
      # "listeners" = what Kafka binds to inside the container
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093"
      # "advertised.listeners" = what Kafka tells clients to connect to
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT_INTERNAL"

      # -------- Single-node dev-friendly defaults --------
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  mailhog:
    image: mailhog/mailhog:latest
    profiles: ["infra", "full"]
    networks: [infra-net]
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8025/ || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 10s

  mysql:
    image: mysql:8.4
    profiles: ["full"]
    networks: [infra-net]
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ROOT_HOST: "%"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping --protocol tcp -h 127.0.0.1 -P 3306 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  order-service:
    profiles: ["full"]
    build:
      context: .
      dockerfile: order-service/Dockerfile
    image: order-service:dev
    networks: [infra-net]
    depends_on:
      kafka:
        condition: service_healthy
      mailhog:
        condition: service_healthy
      mysql:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 25s

  inventory-service:
    profiles: ["full"]
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    image: inventory-service:dev
    networks: [infra-net]
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
      order-service:
        condition: service_healthy
    ports:
      - "8082:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 25s

  shipment-service:
    profiles: ["full"]
    build:
      context: .
      dockerfile: shipment-service/Dockerfile
    image: shipment-service:dev
    networks: [infra-net]
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
    ports:
      - "8083:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 25s

  customer-relations-service:
    profiles: ["full"]
    build:
      context: .
      dockerfile: customer-relations-service/Dockerfile
    image: customer-relations-service:dev
    networks: [infra-net]
    depends_on:
      kafka:
        condition: service_healthy
      mailhog:
        condition: service_healthy
      mysql:
        condition: service_healthy
      shipment-service:
        condition: service_healthy
    ports:
      - "8084:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 25s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    profiles: ["infra", "full"]
    networks: [infra-net]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
