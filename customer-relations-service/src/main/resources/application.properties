spring.application.name=customer-relations-service
server.port=8084
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=customer-relations-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.allow.auto.create.topics=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

spring.datasource.url=jdbc:h2:mem:customerrelationsdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2

# MailHog (IntelliJ / host mode)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

app.mail.from=no-reply@kafka-challenge.local
app.mail.subject-prefix=[Kafka Challenge]
